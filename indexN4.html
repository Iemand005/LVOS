	<script>
	document.captureEvents(Event.MOUSEMOVE | Event.MOUSEDOWN | Event. MOUSEUP);

	var winow = document.layers["clue"];
	var wowdoc = document.layers["wow"].document;
	document.layers["wow"].zIndex = 0;
	winow.zIndex = 10;

	var dialog = new Dialog(winow);


	var startX;
	var startY;
	var dragging = false;

	document.onmousedown = function(ev) {
		startX = ev.pageX;
		startY = ev.pageY;
	};

	document.onmousemove = function(ev) {
		if (!startX) return;
		dialog.move(ev.pageX, ev.pageY);
		dialog.resize(startX - ev.pageX, startY - ev.pageY);

		var ee = winow.document;

	};

	document.onmouseup = function(ev) {
		startX = 0;
		wowdoc.open();
        wowdoc.write('Your text or <strong>your bold text</strong> here');
        wowdoc.close();
	};
	</script>
