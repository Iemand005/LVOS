<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 3.2//EN">
<HTML>
<HEAD>
<TITLE>Netscape 4 Draggable Box</TITLE>
</HEAD>
<BODY BGCOLOR="silver" TEXT="black">

<H1>Netscape 4 Draggable Box</H1>

<P>Click and drag the blue box around the screen.</P>

<LAYER ID="box" LEFT="100" TOP="100" WIDTH="150" HEIGHT="150" BGCOLOR="blue">
  <FONT COLOR="white" SIZE="+2">
    <CENTER>
      <B>Drag Me!</B>
    </CENTER>
  </FONT>
</LAYER>

<SCRIPT LANGUAGE="JavaScript1.2">

var isDragging = false;
var dragLayer = null;
var offsetX = 0;
var offsetY = 0;
var boxLayer = null;

function startDrag(e) {
  alert("MOUSEDOWN fired! e.x=" + e.x + " e.y=" + e.y);
  alert("boxLayer.left=" + boxLayer.left + " boxLayer.top=" + boxLayer.top + " width=" + boxLayer.width + " height=" + boxLayer.height);
  
  // Check if click was on the box layer
  if (e.x >= boxLayer.left && e.x <= (boxLayer.left + boxLayer.width) &&
      e.y >= boxLayer.top && e.y <= (boxLayer.top + boxLayer.height)) {
    
    alert("Click was on box! Starting drag...");
    isDragging = true;
    dragLayer = boxLayer;
    offsetX = e.x - dragLayer.left;
    offsetY = e.y - dragLayer.top;
    
    document.captureEvents(Event.MOUSEMOVE | Event.MOUSEUP);
    document.onmousemove = doDrag;
    document.onmouseup = stopDrag;
  } else {
    alert("Click was NOT on box");
  }
  return false;
}

function doDrag(e) {
  alert("MOUSEMOVE fired!");
  if (isDragging && dragLayer) {
    dragLayer.left = e.x - offsetX;
    dragLayer.top = e.y - offsetY;
  }
  return false;
}

function stopDrag(e) {
  alert("MOUSEUP fired!");
  document.releaseEvents(Event.MOUSEMOVE | Event.MOUSEUP);
  isDragging = false;
  dragLayer = null;
  document.onmousemove = null;
  document.onmouseup = null;
  return false;
}

// Initialize - script runs after page loaded, so LAYER exists
alert("Script starting...");
boxLayer = document.layers['box'];
alert("boxLayer found: " + boxLayer);
alert("boxLayer properties - left:" + boxLayer.left + " top:" + boxLayer.top + " width:" + boxLayer.width + " height:" + boxLayer.height);

document.captureEvents(Event.MOUSEDOWN);
alert("Event capture set up");
document.onmousedown = startDrag;
alert("onmousedown handler assigned");

</SCRIPT>

</BODY>
</HTML>
