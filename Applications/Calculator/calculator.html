<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
html,body{
    margin:0;
    height:100%;
}

table{
    width:100%;
    height:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

/* display row = shrink to content */
#displayRow td{
    height:1px;
    padding:0;
}

/* display */
input{
    width:100%;
    box-sizing:border-box;
    font-size:32px;
    text-align:right;
    border-radius:5px;
}

/* keypad row MUST take remaining space */
#padRow td{
    height:100%;
    padding:0;
    vertical-align:top; /* critical for IE9/10 */
}

/* inner keypad fills its cell */
#pad{
    width:100%;
    height:100%;
    border-collapse:separate;
    border-spacing:6px;
    table-layout:fixed;
}

#pad td{
    border:1px solid #ccc;
    border-radius:5px;
    text-align:center;
    vertical-align:middle;
    font-size:24px;
    cursor:pointer;
}
</style>

</head>

<body>

<table>
    <tr id="displayRow">
        <td>
            <input readonly value="0">
        </td>
    </tr>

    <tr id="padRow">
        <td>
            <table id="pad">
                <tr>
                    <td>C</td><td>±</td><td>%</td><td>/</td>
                </tr>
                <tr>
                    <td>7</td><td>8</td><td>9</td><td>*</td>
                </tr>
                <tr>
                    <td>4</td><td>5</td><td>6</td><td>-</td>
                </tr>
                <tr>
                    <td>1</td><td>2</td><td>3</td><td>+</td>
                </tr>
                <tr>
                    <td colspan="2">0</td><td>.</td><td>=</td>
                </tr>
            </table>
        </td>
    </tr>
</table>

</body>
</html>
