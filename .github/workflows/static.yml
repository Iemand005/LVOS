name: Deploy static content to Pages

on:
  push:
    branches: ["master"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout current site (master)
        uses: actions/checkout@v4
        with:
          ref: master
          path: current
          submodules: false

      - name: Checkout old site (old branch)
        uses: actions/checkout@v4
        with:
          ref: old
          path: oldsite
          submodules: false

      - name: Initialize submodules for current site
        working-directory: current
        run: |
          git submodule sync
          git submodule update --init Scripts/WebGraphics
          git submodule update --init Applications/FrostedColours
          git submodule update --init Applications/StereogramMaker
          git submodule update --init Applications/Cyanide

      - name: Build Pages folder
        run: |
          mkdir public

          # Copy current site to root
          cp -r current/* public/

          # Copy old site into /old
          mkdir -p public/old
          cp -r oldsite/* public/old/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4