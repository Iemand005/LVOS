<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
html,body{
    margin:0;
    height:100%;
}

/* display */
#displayWrap{
    height:15%;
}

input{
    width:100%;
    height:100%;
    box-sizing:border-box;
    font-size:32px;
    text-align:right;
    margin:0;
    border-radius:5px;
}

/* keypad */
#pad{
    width:100%;
    height:85%;
    border-collapse:separate;
    border-spacing:6px;
    table-layout:fixed;
}

td{
    border:1px solid #ccc;
    border-radius:5px;
    text-align:center;
    vertical-align:middle;
    font-size:24px;
    cursor:pointer;
}
</style>

</head>

<body>

<div id="displayWrap">
    <input readonly value="0">
</div>

<table id="pad">
    <tr>
        <td>C</td>
        <td>±</td>
        <td>%</td>
        <td>/</td>
    </tr>

    <tr>
        <td>7</td>
        <td>8</td>
        <td>9</td>
        <td>*</td>
    </tr>

    <tr>
        <td>4</td>
        <td>5</td>
        <td>6</td>
        <td>-</td>
    </tr>

    <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>+</td>
    </tr>

    <tr>
        <td colspan="2">0</td>
        <td>.</td>
        <td>=</td>
    </tr>
</table>

</body>
</html>
