<!DOCTYPE html>
<html lang="nl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		.svg-glass {
			filter: url(#liquid-glass);
		}
	</style>
</head>
<body>
	<svg width="0" height="0">
    <filter id="liquid-glass">
        <feTurbulence
            id="noise"
            type="fractalNoise"
            baseFrequency="0.015 0.03"
            numOctaves="2"
            seed="1"
            result="noise" />

        <feDisplacementMap
            in="SourceGraphic"
            in2="noise"
            scale="20"
            xChannelSelector="R"
            yChannelSelector="G" />
    </filter>
</svg>
</body>
</html>
