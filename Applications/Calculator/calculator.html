<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">

	<script src="./Calculator.js" defer></script>
	<!-- <script src="../../Scripts/LVOSLoader.js" defer></script> -->
	<link rel="stylesheet" href="calculator.css">
	<link rel="stylesheet" href="../../Styles/general.css">
</head>

<body>

	<table>
		<tr id="displayRow">
			<td colspan="4">
				<input id="display" readonly value="0">
			</td>
		</tr>

		<tr>
			<td class="button">C</td>
			<td class="button">±</td>
			<td class="button">%</td>
			<td class="button">/</td>
		</tr>

		<tr>
			<td class="button">7</td>
			<td class="button">8</td>
			<td class="button">9</td>
			<td class="button">*</td>
		</tr>

		<tr>
			<td class="button">4</td>
			<td class="button">5</td>
			<td class="button">6</td>
			<td class="button">-</td>
		</tr>

		<tr>
			<td class="button">1</td>
			<td class="button">2</td>
			<td class="button">3</td>
			<td class="button">+</td>
		</tr>

		<tr>
			<td class="button" colspan="2">0</td>
			<td class="button">.</td>
			<td class="button">=</td>
		</tr>
	</table>

</body>

</html>
