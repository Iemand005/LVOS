<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<style>
		* {
			margin: 0;
			padding: 0;
		}

		html,
		body {
			height: 100%;
		}

		form {
			display: table;
			width: 100%;
			height: 100%;
		}

		input {
			background: red;
			display: table-row;
			width: 100%;
			border: none;
		}

		input[type="button"] {
			height: 100%;
			/* additions for filling cell */
			display: block;
			width: 100%;
			margin: 0;
			box-sizing: border-box;
		}

		div {
			background: green;
			display: table-row;
			height: 100%;
		}

		table {
			width: 100%;
			height: 100%;
			border-collapse: collapse;
		}
		
		/* minimal changes for variable rows */
		td {
			padding: 0;
		}
		tr {
			height: 1%;   /* old trick – rows share remaining height equally */
		}
	</style>
</head>

<body>
	<form>
		<input value="hi">
		<div>
			<table>
				<tbody>
					<!-- you can add or remove rows, they will automatically stretch equally -->
					<tr>
						<td><input type="button" value="7"></td>
						<td><input type="button" value="8"></td>
						<td><input type="button" value="9"></td>
						<td><input type="button" value="*"></td>
					</tr>
					<tr>
						<td><input type="button" value="4"></td>
						<td><input type="button" value="5"></td>
						<td><input type="button" value="6"></td>
						<td><input type="button" value="-"></td>
					</tr>
					<tr>
						<td><input type="button" value="1"></td>
						<td><input type="button" value="2"></td>
						<td><input type="button" value="3"></td>
						<td><input type="button" value="+"></td>
					</tr>
					<tr>
						<td><input type="button" value="C"></td>
						<td><input type="button" value="0"></td>
						<td><input type="button" value="."></td>
						<td><input type="button" value="="></td>
					</tr>
					<!-- you could add a 5th row here, and all rows would share height equally -->
				</tbody>
			</table>
		</div>
	</form>
</body>

</html>
