<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<script src="./Calculator.js" defer></script>
    <script src="../../Scripts/LVOSLoader.js" defer></script>

<style>
html,body{
    margin:0;
    height:100%;
}

table{
    width:100%;
    height:100%;
    border-collapse:separate;
    border-spacing:6px;
    table-layout:fixed;
}

/* display row stays minimal */
#displayRow td{
    height:1px;
    padding:0;
}

/* display */
input{
    width:100%;
    box-sizing:border-box;
    font-size:32px;
    text-align:right;
    border-radius:5px;
}

/* keypad cells */
td.key{
    border:1px solid #ccc;
    border-radius:5px;
    text-align:center;
    vertical-align:middle;
    font-size:24px;
    cursor:pointer;
	background-color: #ffffff38;
	border-radius: 5px;
	border: 1px solid #ffffff70;
	font-size: 1rem;
}
</style>

</head>

<body>

<table>
    <tr id="displayRow">
        <td colspan="4">
            <input readonly value="0">
        </td>
    </tr>

    <tr>
        <td class="key">C</td>
        <td class="key">±</td>
        <td class="key">%</td>
        <td class="key">/</td>
    </tr>

    <tr>
        <td class="key">7</td>
        <td class="key">8</td>
        <td class="key">9</td>
        <td class="key">*</td>
    </tr>

    <tr>
        <td class="key">4</td>
        <td class="key">5</td>
        <td class="key">6</td>
        <td class="key">-</td>
    </tr>

    <tr>
        <td class="key">1</td>
        <td class="key">2</td>
        <td class="key">3</td>
        <td class="key">+</td>
    </tr>

    <tr>
        <td class="key" colspan="2">0</td>
        <td class="key">.</td>
        <td class="key">=</td>
    </tr>
</table>

</body>
</html>
