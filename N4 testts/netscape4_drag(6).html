<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 3.2//EN">
<HTML>
<HEAD>
<TITLE>Netscape 4 Draggable Box</TITLE>
</HEAD>
<BODY BGCOLOR="silver" TEXT="black">

<H1>Netscape 4 Draggable Box</H1>

<P>Click and drag the blue box to move it. Drag from the bottom-right corner to resize.</P>

<LAYER NAME="mybox" LEFT="100" TOP="100" WIDTH="150" HEIGHT="150" BGCOLOR="blue">
  <FONT COLOR="white" SIZE="+2">
    <CENTER>
      <B>Drag Me!</B>
    </CENTER>
  </FONT>
</LAYER>

<SCRIPT LANGUAGE="JavaScript1.2">

var draggedLayer = null;
var offsetX = 0;
var offsetY = 0;
var resizeMode = false;
var initialWidth = 150;
var initialHeight = 150;
var BOX_WIDTH = 150;
var BOX_HEIGHT = 150;
var RESIZE_HANDLE_SIZE = 20;

function startDrag(e) {
  var layer = document.layers['mybox'];
  var clickX = e.pageX;
  var clickY = e.pageY;
  
  // Check if click is within the layer bounds
  var layerRight = layer.left + BOX_WIDTH;
  var layerBottom = layer.top + BOX_HEIGHT;
  
  if (clickX >= layer.left && clickX <= layerRight &&
      clickY >= layer.top && clickY <= layerBottom) {
    
    // Check if in bottom-right corner for resize
    if (clickX > (layerRight - RESIZE_HANDLE_SIZE) &&
        clickY > (layerBottom - RESIZE_HANDLE_SIZE)) {
      // Start resize mode
      draggedLayer = layer;
      offsetX = e.pageX;
      offsetY = e.pageY;
      initialWidth = BOX_WIDTH;
      initialHeight = BOX_HEIGHT;
      resizeMode = true;
    } else {
      // Start drag mode
      draggedLayer = layer;
      offsetX = e.layerX;
      offsetY = e.layerY;
      resizeMode = false;
    }
    
    window.captureEvents(Event.MOUSEMOVE | Event.MOUSEUP);
    window.onmousemove = doDrag;
    window.onmouseup = stopDrag;
  }
  
  return false;
}

function doDrag(e) {
  if (draggedLayer) {
    if (resizeMode) {
      // Resize mode
      var deltaX = e.pageX - offsetX;
      var deltaY = e.pageY - offsetY;
      BOX_WIDTH = Math.max(50, initialWidth + deltaX);
      BOX_HEIGHT = Math.max(50, initialHeight + deltaY);
      draggedLayer.width = BOX_WIDTH;
      draggedLayer.height = BOX_HEIGHT;
    } else {
      // Drag mode
      draggedLayer.left = e.pageX - offsetX;
      draggedLayer.top = e.pageY - offsetY;
    }
  }
  return false;
}

function stopDrag(e) {
  window.releaseEvents(Event.MOUSEMOVE | Event.MOUSEUP);
  draggedLayer = null;
  resizeMode = false;
  window.onmousemove = null;
  window.onmouseup = null;
  return false;
}

// Initialize
window.captureEvents(Event.MOUSEDOWN);
window.onmousedown = startDrag;

</SCRIPT>

</BODY>
</HTML>
