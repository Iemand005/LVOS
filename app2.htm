<!DOCTYPE html>
<html lang="en">
<head>
    <title>LVOS Parent</title>
    <hta:application id="oHTA" applicationname="LVOS" icon="explorer.exe" sysmenu="yes" caption="yes" windowstate="normal"></hta:application>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <style>
        html, body, .fullscreen { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    </style>
</head>
<body>  

    <!-- Added an ID 'myFrame' and an onload trigger -->
    <iframe id="myFrame" src="./index.html" frameborder="0" class="fullscreen" application="yes" onload="setupIframeDrag()"></iframe>

<script>
    function setupIframeDrag() {
        var iframe = document.getElementById('myFrame');
        // Access the inner document window of the iframe
        var iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

        // 1. Prevent default redirect inside the iframe
        iframeDoc.addEventListener("dragenter", function(e) { e.preventDefault(); }, false);
        iframeDoc.addEventListener("dragover", function(e) { e.preventDefault(); }, false);

        // 2. Intercept the file drop inside the iframe
        iframeDoc.addEventListener("drop", function(e) {
            e.preventDefault(); // This stops the iframe redirect!

            // Pull the data using the text layout format
            var rawData = e.dataTransfer.getData("text");
            
            if (rawData) {
                var cleanPaths = rawData.replace(/"/g, '').split(/[\r\n]+/);
                for (var i = 0; i < cleanPaths.length; i++) {
                    if (cleanPaths[i].trim() !== "") {
                        alert("Dropped file into iframe: " + cleanPaths[i]);
                        // Execute your backend logic here
                    }
                }
            }
        }, false);
    }
</script>

</body>
</html>
