<body class="blur">
    <main>

        <div id="desktop">
            <div id="windows">
                <!-- <iframe src="./Applications/FrostedColours/index.html" id="wallpaper" frameborder="0"></iframe> -->
                 <span id="wallpaper">
                    <iframe src="./Applications/FrostedColours/index.html" frameborder="0"></iframe>
                     <!-- <img src="file:///C:\Users\Lasse\Documents\Projects\LVOS\Applications\GeodeWeb\StellarVeryLight.png" class="backdrop" alt="" srcset=""> -->
                 </span>
                <div>
                    <form action="" id="applist"></form>
                </div>
                <!-- <article id="dockcontaner">
                    
                </article> -->
                <div id="dock">
                    <section id="reflection"></section>
                </div>
                <div id="dockapplist"></div>

                <div class="template" id="window-template"><!-- Template of my semantic and minimal structure used to create floating dialogs. I used the information provided by Visual Studio Code to determine what tags fit the purpose best. I hope this makes it as semantically correct as possible while excluding excessive divs and other tags. -->
                    <div class="window">
                        <div class="content"><!-- Visual Sudio 2013 suggested me to use content instead here to make it semantic. This places the dialog inside the shadow DOM. I don't know if it's proper HTML 5 or HTML 4 but I used it so I'm keeping it the way it is for now. -->
                            <!-- I was forced to add this extra wrapping article to work around a bug in EdgeHTML 18 that causes the backdrop filter to shift by the amount of pixels the box-shadow blur size has minus the top and left value. I don't know if it's a known bug but the browser is no longer officially supported. I will be adding this tag anyways but it's not necessary for functionality of the application. -->
                            <div class="header"><!-- This header identifies the most near ancestor (dialog). In the header are the title and the navigation buttons. -->
                                <h1></h1><!-- Title of the window and also identifier of the header and dialog. -->
                                <div class="section"><!-- Section used for thematic grouping of content. The grouping is necessary to keep the buttons together without needing extra unstable css tricks. -->
                                    <button disabled>🡕</button>
                                    <button disabled>❐</button>
                                    <button disabled>✕</button><!-- The navigation button styling is completely taken care of by css. -->
                                </div><!-- This is the 5th? revision of my semantic floating dialog scheme. -->
                            </div>
                            <div class="article">
                                <!-- This is the client area! Here the application itself should be placed. -->
                            </div>
                        </div>
                        <span class="backdrop-clip"></span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
