<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<style>
		* {
			margin: 0;
			padding: 0;
		}

		html,
		body {
			height: 100%;
		}

		form {
			display: table;
			width: 100%;
			height: 100%;
		}

		input {
			background: red;
			display: table-row;
			width: 100%;
			border: none;
		}

		input[type="button"] {
			height: 100%;
			display: block;
			width: 100%;
			margin: 0;
			box-sizing: border-box;
		}

		div {
			background: green;
			display: table-row;
			height: 100%;
		}

		table {
			width: 100%;
			height: 100%;
			border-collapse: collapse;
		}
		
		td {
			padding: 0;
		}
		
		/* Equal row height for any number of rows (IE9+) */
		tr {
			height: 0.1%;
		}
	</style>
</head>

<body>
	<form>
		<input value="hi">
		<div>
			<!-- ONLY ADDITION: a table-cell wrapper to make height:100% work in IE8/9/10 -->
			<div style="display: table-cell; height: 100%;">
				<table>
					<tbody>
						<tr>
							<td><input type="button" value="7"></td>
							<td><input type="button" value="8"></td>
							<td><input type="button" value="9"></td>
							<td><input type="button" value="*"></td>
						</tr>
						<tr>
							<td><input type="button" value="4"></td>
							<td><input type="button" value="5"></td>
							<td><input type="button" value="6"></td>
							<td><input type="button" value="-"></td>
						</tr>
						<tr>
							<td><input type="button" value="1"></td>
							<td><input type="button" value="2"></td>
							<td><input type="button" value="3"></td>
							<td><input type="button" value="+"></td>
						</tr>
						<tr>
							<td><input type="button" value="C"></td>
							<td><input type="button" value="0"></td>
							<td><input type="button" value="."></td>
							<td><input type="button" value="="></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</form>
</body>

</html>
