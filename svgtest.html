<!DOCTYPE html>
<html lang="nl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		.svg-glass {
			filter: url(#liquid-glass);
			background-color: rgba(255, 255, 255, 0.395);
			width: 200px;
			height: 200px;
		}
		iframe {
			width: 100%;
			height: 100%;
			z-index: 0;
			top: 0
			;
			bottom: 0;
			left: 0;
			position: absolute;
		}
	</style>
</head>
<body>
<iframe src="./Applications/FrostedColours/index.html" frameborder="0"></iframe>

	<svg width="0" height="0">
    <filter id="liquid-glass">
        <feTurbulence
            id="noise"
            type="fractalNoise"
            baseFrequency="0.015 0.03"
            numOctaves="2"
            seed="1"
            result="noise" />

        <feDisplacementMap
            in="SourceGraphic"
            in2="noise"
            scale="20"
            xChannelSelector="R"
            yChannelSelector="G" />
    </filter>
</svg>
<div class="svg-glass">
    Hello world
</div>
</body>
</html>
