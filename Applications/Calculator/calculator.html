<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<style>
		* {
			margin: 0;
			padding: 0;
		}

		html,
		body {
			height: 100%;
		}

		form {
			display: table;
			width: 100%;
			height: 100%;
		}

		input {
			background: red;
			display: table-row;
			width: 100%;
			border: none;
		}

		input[type="button"] {
			height: 100%;
			display: block;
			width: 100%;
			margin: 0;
			box-sizing: border-box;
		}

		/* GREEN AREA – now a positioning parent */
		div {
			background: green;
			display: table-row;
			height: 100%;
			position: relative;    /* NEW */
		}

		/* TABLE – absolute fill inside the green area */
		div > table {
			position: absolute;    /* NEW */
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			width: 100%;
			border-collapse: collapse;
		}

		td {
			padding: 0;
		}

		/* equal row distribution (works for any number of rows) */
		tr {
			height: 0.1%;
		}
	</style>
</head>

<body>
	<form>
		<input value="hi">
		<div>
			<!-- table remains exactly as you wrote it -->
			<table>
				<tbody>
					<tr>
						<td><input type="button" value="7"></td>
						<td><input type="button" value="8"></td>
						<td><input type="button" value="9"></td>
						<td><input type="button" value="*"></td>
					</tr>
					<tr>
						<td><input type="button" value="4"></td>
						<td><input type="button" value="5"></td>
						<td><input type="button" value="6"></td>
						<td><input type="button" value="-"></td>
					</tr>
					<tr>
						<td><input type="button" value="1"></td>
						<td><input type="button" value="2"></td>
						<td><input type="button" value="3"></td>
						<td><input type="button" value="+"></td>
					</tr>
					<tr>
						<td><input type="button" value="C"></td>
						<td><input type="button" value="0"></td>
						<td><input type="button" value="."></td>
						<td><input type="button" value="="></td>
					</tr>
				</tbody>
			</table>
		</div>
	</form>
</body>

</html>
