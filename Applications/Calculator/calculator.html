<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * {
    margin: 0;
    padding: 0;
  }
  html, body {
    height: 100%;
  }
  .container {
    display: table;
    width: 100%;
    height: 100%;
  }
  .top {
    background: red;
    display: table-row;
  }
  .bottom {
    background: green;
    display: table-row;
    height: 100%;
  }
</style>
</head>
<body>
<form class="container">
  <output class="top">e</output>
  <table class="bottom">e</table>
</form>
</body>
</html>
