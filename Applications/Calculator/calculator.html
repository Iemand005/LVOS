<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
html,
body {
    margin:0;
    height:100%;
}

table {
    width:100%;
    height:100%;
    border-collapse:separate;
    border-spacing:6px;
    table-layout:fixed;
}

td {
    padding:0;
    text-align:center;
    vertical-align:middle;
    font-size:24px;
    cursor:pointer;
    border:1px solid #ccc;
	border-radius: 5px;
}

/* display */
input {
    width:100%;
    height:100%;
    box-sizing:border-box;
    font-size:32px;
    text-align:right;
}
</style>
    <!-- <link rel="stylesheet" href="style.css"> -->

</head>

<body>
<form>
	<input readonly value="0">
<table>

    <tr>
        <td>C</td>
        <td>±</td>
        <td>%</td>
        <td>/</td>
    </tr>

    <tr>
        <td>7</td>
        <td>8</td>
        <td>9</td>
        <td>*</td>
    </tr>

    <tr>
        <td>4</td>
        <td>5</td>
        <td>6</td>
        <td>-</td>
    </tr>

    <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>+</td>
    </tr>

    <tr>
        <td colspan="2">0</td>
        <td>.</td>
        <td>=</td>
    </tr>
</table>
</form>
</body>
</html>
