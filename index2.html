<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial; padding:20px; }
        .dropzone { border:3px dashed #aaa; padding:40px; text-align:center; }
    </style>
</head>
<body>
<div class="dropzone">
    <h2>Drop files or text here</h2>
</div>
<div id="output"></div>

<script>
    // This function will be called from the parent HTA
    window.handleDropInContent = function(files, text) {
        var out = document.getElementById('output');
        out.innerHTML = '';
        if (files.length > 0) {
            out.innerHTML += '<strong>Files:</strong><ul>';
            for (var i=0; i<files.length; i++) {
                out.innerHTML += '<li>' + files[i].name + '</li>';
            }
            out.innerHTML += '</ul>';
        }
        if (text) {
            out.innerHTML += '<strong>Text:</strong><pre>' + text + '</pre>';
        }
    };
</script>
</body>
</html>
