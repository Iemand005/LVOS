<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
html,body{
    margin:0;
    height:100%;
}

table{
    width:100%;
    height:100%;
    border-collapse:separate;
    border-spacing:6px; /* this is your "margin" between buttons */
    table-layout:fixed;
}

td{
    padding:0;
    text-align:center;
    vertical-align:middle;
    font-size:24px;
    cursor:pointer;
    border:1px solid #ccc;
}

/* actual button surface */
td > div{
    width:100%;
    height:100%;
    display:block;
    background:#fff;
    line-height:1;
}

/* display */
input{
    width:100%;
    height:100%;
    box-sizing:border-box;
    font-size:32px;
    text-align:right;
}
</style>

</head>

<body>

<table>
    <tr>
        <td colspan="4">
            <input readonly value="0">
        </td>
    </tr>

    <tr>
        <td><div>C</div></td>
        <td><div>±</div></td>
        <td><div>%</div></td>
        <td><div>/</div></td>
    </tr>

    <tr>
        <td><div>7</div></td>
        <td><div>8</div></td>
        <td><div>9</div></td>
        <td><div>*</div></td>
    </tr>

    <tr>
        <td><div>4</div></td>
        <td><div>5</div></td>
        <td><div>6</div></td>
        <td><div>-</div></td>
    </tr>

    <tr>
        <td><div>1</div></td>
        <td><div>2</div></td>
        <td><div>3</div></td>
        <td><div>+</div></td>
    </tr>

    <tr>
        <td colspan="2"><div>0</div></td>
        <td><div>.</div></td>
        <td><div>=</div></td>
    </tr>
</table>

</body>
</html>
