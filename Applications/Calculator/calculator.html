<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
html,body{
    margin:0;
    height:100%;
}

body{
    display:block;
}

/* top display area */
#displayWrap{
    height:15%;
}

input{
    width:100%;
    height:100%;
    box-sizing:border-box;
    font-size:32px;
    text-align:right;
    margin:0;
}

/* bottom keypad */
#pad{
    width:100%;
    height:85%;
    border-collapse:separate;
    border-spacing:6px;
    table-layout:fixed;
}

td{
    border:1px solid #ccc;
    text-align:center;
    vertical-align:middle;
    font-size:24px;
    cursor:pointer;
    padding:0;
}

td > div{
    width:100%;
    height:100%;
    display:block;
}
</style>

</head>

<body>

<div id="displayWrap">
    <input readonly value="0">
</div>

<table id="pad">
    <tr>
        <td><div>C</div></td>
        <td><div>±</div></td>
        <td><div>%</div></td>
        <td><div>/</div></td>
    </tr>

    <tr>
        <td><div>7</div></td>
        <td><div>8</div></td>
        <td><div>9</div></td>
        <td><div>*</div></td>
    </tr>

    <tr>
        <td><div>4</div></td>
        <td><div>5</div></td>
        <td><div>6</div></td>
        <td><div>-</div></td>
    </tr>

    <tr>
        <td><div>1</div></td>
        <td><div>2</div></td>
        <td><div>3</div></td>
        <td><div>+</div></td>
    </tr>

    <tr>
        <td colspan="2"><div>0</div></td>
        <td><div>.</div></td>
        <td><div>=</div></td>
    </tr>
</table>

</body>
</html>
