<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
html,body{
    margin:0;
    height:100%;
}

table{
    width:100%;
    height:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

td{
    border:1px solid #ccc;
    text-align:center;
    vertical-align:middle;
    cursor:pointer;
    font-size:24px;
    padding:0;
}

input{
    width:100%;
    height:100%;
    box-sizing:border-box;
    font-size:32px;
    text-align:right;
}

/* key trick */
.fill{
    height:100%;
    width:1px;
    display:inline-block;
    vertical-align:middle;
}
</style>

</head>

<body>

<table>
    <tr>
        <td colspan="4">
            <input readonly value="0">
        </td>
    </tr>

    <tr>
        <td><span class="fill"></span>C</td>
        <td><span class="fill"></span>±</td>
        <td><span class="fill"></span>%</td>
        <td><span class="fill"></span>/</td>
    </tr>

    <tr>
        <td><span class="fill"></span>7</td>
        <td><span class="fill"></span>8</td>
        <td><span class="fill"></span>9</td>
        <td><span class="fill"></span>*</td>
    </tr>

    <tr>
        <td><span class="fill"></span>4</td>
        <td><span class="fill"></span>5</td>
        <td><span class="fill"></span>6</td>
        <td><span class="fill"></span>-</td>
    </tr>

    <tr>
        <td><span class="fill"></span>1</td>
        <td><span class="fill"></span>2</td>
        <td><span class="fill"></span>3</td>
        <td><span class="fill"></span>+</td>
    </tr>

    <tr>
        <td colspan="2"><span class="fill"></span>0</td>
        <td><span class="fill"></span>.</td>
        <td><span class="fill"></span>=</td>
    </tr>
</table>

</body>
</html>
