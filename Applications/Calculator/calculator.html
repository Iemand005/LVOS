<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Calculator</title>

<style type="text/css">
html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
}

body {
    font-family: Arial, sans-serif;
}

#calculator {
    width: 100%;
    height: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}

#display {
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    border: 1px solid #999;
    font-size: 32px;
    text-align: right;
    padding: 10px;
}

.button-cell {
    padding: 0;
}

.button-cell button {
    width: 100%;
    height: 100%;
    margin: 0;
    border: 1px solid #999;
    font-size: 24px;
    cursor: pointer;
}
</style>

</head>
<body>

<table id="calculator">
    <tr style="height:15%;">
        <td colspan="4">
            <input id="display" type="text" readonly="readonly" value="0">
        </td>
    </tr>

    <tr style="height:17%;">
        <td class="button-cell"><button>C</button></td>
        <td class="button-cell"><button>±</button></td>
        <td class="button-cell"><button>%</button></td>
        <td class="button-cell"><button>/</button></td>
    </tr>

    <tr style="height:17%;">
        <td class="button-cell"><button>7</button></td>
        <td class="button-cell"><button>8</button></td>
        <td class="button-cell"><button>9</button></td>
        <td class="button-cell"><button>*</button></td>
    </tr>

    <tr style="height:17%;">
        <td class="button-cell"><button>4</button></td>
        <td class="button-cell"><button>5</button></td>
        <td class="button-cell"><button>6</button></td>
        <td class="button-cell"><button>-</button></td>
    </tr>

    <tr style="height:17%;">
        <td class="button-cell"><button>1</button></td>
        <td class="button-cell"><button>2</button></td>
        <td class="button-cell"><button>3</button></td>
        <td class="button-cell"><button>+</button></td>
    </tr>

    <tr style="height:17%;">
        <td colspan="2" class="button-cell"><button>0</button></td>
        <td class="button-cell"><button>.</button></td>
        <td class="button-cell"><button>=</button></td>
    </tr>
</table>

</body>
</html>
