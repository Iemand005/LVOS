<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>
html,body{
    margin:0;
    height:100%;
}

table{
    width:100%;
    height:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

td{
    border:1px solid #ccc;
    text-align:center;
    vertical-align:middle;
    cursor:pointer;
    font-size:24px;
}

input{
    width:100%;
    height:100%;
    box-sizing:border-box;
    font-size:32px;
    text-align:right;
}
</style>

</head>

<body>

<table>
    <tr>
        <td colspan="4">
            <input readonly value="0">
        </td>
    </tr>

    <tr>
        <td>C</td>
        <td>±</td>
        <td>%</td>
        <td>/</td>
    </tr>

    <tr>
        <td>7</td>
        <td>8</td>
        <td>9</td>
        <td>*</td>
    </tr>

    <tr>
        <td>4</td>
        <td>5</td>
        <td>6</td>
        <td>-</td>
    </tr>

    <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>+</td>
    </tr>

    <tr>
        <td colspan="2">0</td>
        <td>.</td>
        <td>=</td>
    </tr>
</table>

</body>
</html>
