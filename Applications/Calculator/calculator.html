<!DOCTYPE html>
<html>
<head>
<style>
html,body{
    margin:0;
    height:100%;
}

table{
    width:100%;
    height:100%;
    table-layout:fixed;
}

tr{
    height:1%;
}

td{
    padding:0;
}

input,
button{
    width:100%;
    height:100%;
    box-sizing:border-box;
}
</style>
</head>
<body>

<table>
    <tr>
        <td colspan="4">
            <input readonly value="0">
        </td>
    </tr>

    <tr>
        <td><button>C</button></td>
        <td><button>±</button></td>
        <td><button>%</button></td>
        <td><button>/</button></td>
    </tr>

    <tr>
        <td><button>7</button></td>
        <td><button>8</button></td>
        <td><button>9</button></td>
        <td><button>*</button></td>
    </tr>

    <tr>
        <td><button>4</button></td>
        <td><button>5</button></td>
        <td><button>6</button></td>
        <td><button>-</button></td>
    </tr>

    <tr>
        <td><button>1</button></td>
        <td><button>2</button></td>
        <td><button>3</button></td>
        <td><button>+</button></td>
    </tr>

    <tr>
        <td colspan="2"><button>0</button></td>
        <td><button>.</button></td>
        <td><button>=</button></td>
    </tr>
</table>

</body>
</html>
